<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Terrain Walker | Smart Directions</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css?v=48e5ae">
</head>
<body>
    <div id="map"></div>

    <div class="search-panel">
        <div class="input-group">
            <div class="icon start-icon"></div>
            <input type="text" id="input-start" placeholder="Choose starting point..." autocomplete="off">
            <button id="btn-my-location" class="icon-btn" title="Use Current Location">📍</button>
            <div id="autocomplete-start" class="autocomplete-list"></div>
        </div>
        
        <div class="swap-container">
            <button id="btn-swap" class="icon-btn swap-btn" title="Swap">⇅</button>
        </div>

        <div class="input-group">
            <div class="icon end-icon"></div>
            <input type="text" id="input-end" placeholder="Choose destination..." autocomplete="off">
            <div id="autocomplete-end" class="autocomplete-list"></div>
        </div>
    </div>
    <!-- Theme Toggle Button -->
    <button id="btn-theme" class="theme-toggle-btn">🌓</button>
    

    <!-- Bottom Sheet -->
    <div id="bottom-sheet" class="bottom-sheet collapsed">
        <div class="handle-zone" id="sheet-toggle"><div class="drag-handle"></div></div>
        
        <div class="sheet-content">

            <!-- Status / Loading / Idle State -->
            <div id="status-state" class="status-state">
                <!-- Spinner hidden by default on load -->
                <div id="status-spinner" class="spinner" style="display: none;"></div>
                <p id="status-text">Set a destination to start your search.</p>
            </div>

            <!-- Global Context Bar -->
            <div id="global-context" class="global-context-bar hidden">
                <span id="weather-icon">🌤</span>
                <span id="weather-text">Loading weather...</span>
            </div>

            <!-- The 3 Route Options -->
            <div id="route-options-container" class="route-list">
                <!-- JavaScript will inject the 3 route cards here -->
            </div>

            <!-- Route Details (Hidden by default, shown for the selected route) -->
            <div id="route-details" class="route-details hidden">
                <button class="primary-btn" id="btn-start-nav">Start Walking</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    
    <script type="module" src="js/app.js?v=48e5ae"></script>
</body>
</html>
